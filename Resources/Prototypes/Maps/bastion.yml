- type: gameMap
  id: Bastion
  mapName: 'Bastion'
  mapPath: /Maps/bastion.yml
  minPlayers: 60
  maxPlayers: 100
  stations:
    Bastion:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Bastion {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_rod.yml
        - type: StationCargoShuttle
          path: /Maps/Shuttles/cargo_fland.yml
        - type: StationJobs
          overflowJobs:
            - Passenger
          availableJobs:
            #service
            #engineering
            #medical
            #science
            #security
            #supply
            #civilian
            Passenger: [ -1, -1 ]

